name: Build Only

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual build (optional)'
        required: false
        default: 'Manual build triggered'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload build as artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: build-${{ github.run_number }}
          path: dist/  # Adjust this path based on your build output directory
          retention-days: 30
